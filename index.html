<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Guardián</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --dorado-suave: #C5A059;
            --azul-francia: #0000FF;
            --bordo: #800020;
            --negro-encuadre: #000000;
        }
        body { 
            background: linear-gradient(135deg, #FFFFFF 0%, #FDF5E6 40%, #C5A059 70%, #B87333 100%); 
            font-family: 'Georgia', serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; 
        }
        .header { flex: 0.5; display: flex; align-items: center; justify-content: center; }
        .titulo-guardian { 
            font-size: 3rem; color: var(--azul-francia); 
            -webkit-text-stroke: 1.5px var(--dorado-suave); 
            text-shadow: 0 0 10px var(--azul-francia); 
            margin: 0; 
        }
        .chat-box { flex: 2.5; max-width: 900px; margin: 10px auto; width: 95%; background: var(--negro-encuadre); padding: 20px; border: 3px solid var(--dorado-suave); border-radius: 12px; overflow-y: auto; color: var(--dorado-suave); }
        .controls { max-width: 900px; margin: 0 auto 20px auto; width: 95%; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 15px; border: 1px solid var(--dorado-suave); border-radius: 4px; background: #fff; color: var(--azul-francia); }
        .btn-row { display: flex; gap: 10px; justify-content: center; }
        button, .pay-btn { padding: 10px 20px; border-radius: 4px; border: 1px solid var(--dorado-suave); cursor: pointer; font-weight: bold; background: #FDF5E6; }
        button { color: var(--bordo); }
        .pay-btn { background: var(--dorado-suave); color: var(--bordo); text-decoration: none; padding: 10px 40px; }
        .message { margin-bottom: 15px; line-height: 1.6; color: var(--dorado-suave); }
        .message p { margin: 10px 0; }
        b { color: var(--dorado-suave); }
        .footer { text-align: center; font-size: 0.8rem; color: var(--azul-francia); }
        #counter { text-align: center; font-size: 0.9rem; color: var(--bordo); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="titulo-guardian">EL GUARDIÁN</h1>
    </div>
    <div id="counter">Consultas restantes: 3</div>
    <div class="chat-box" id="chat-box"><div class="message">Sistema operativo listo.</div></div>
    <div class="controls">
        <input type="text" id="user-input" placeholder="Consultar...">
        <div class="btn-row">
            <button onclick="sendMessage()">ENVIAR</button>
            <button onclick="descargarPDF()">PDF</button>
            <a href="https://www.paypal.com/ncp/payment/T9WX7B8J7HRC2" target="_blank" class="pay-btn">VERSIÓN PLUS</a>
        </div>
    </div>
    <div class="footer">pandaorizont@gmail.com</div>

    <script>
        let count = parseInt(localStorage.getItem('guardianCount')) || 0;
        document.getElementById("counter").innerText = `Consultas restantes: ${3 - count}`;

        async function sendMessage() {
            if (count >= 3) { alert("Límite diario alcanzado."); return; }
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            if (text === "") return;
            
            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="message"><b>Usuario:</b> ${text}</div>`;
            inputField.value = "";
            count++;
            localStorage.setItem('guardianCount', count);
            document.getElementById("counter").innerText = `Consultas restantes: ${3 - count}`;
            
            try {
                const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer jcLqNeW5k32fSAFm6BRhGWkWnag7Qu0I" },
                    body: JSON.stringify({ 
                        model: "mistral-tiny", 
                        messages: [{ role: "system", content: "Eres El Guardián. Responde de forma seria y profesional. Estructura tu respuesta en párrafos claros usando saltos de línea. NO uses asteriscos, NO uses comillas, NO uses emojis. Dame solo texto limpio." }, 
                                   { role: "user", content: text }] 
                    })
                });
                const json = await response.json();
                let respuesta = json.choices[0].message.content.replace(/[*"']/g, "");
                
                const parrafos = respuesta.split('\n').filter(p => p.trim() !== "");
                const htmlRespuesta = parrafos.map(p => `<p>${p}</p>`).join("");
                
                chatBox.innerHTML += `<div class="message"><b>Guardián:</b> ${htmlRespuesta}</div>`;
                
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(respuesta);
                msg.lang = 'es-ES'; msg.pitch = 0.5; msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            } catch (e) { chatBox.innerHTML += `<div class="message">Error de conexión.</div>`; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function descargarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const chatBox = document.getElementById("chat-box");
            const textoCompleto = chatBox.innerText.replace(/[*"']/g, "");
            
            doc.setFontSize(12);
            const margenes = 10;
            const anchoPagina = 180;
            const lineas = doc.splitTextToSize(textoCompleto, anchoPagina);
            
            let y = 20;
            lineas.forEach((linea) => {
                if (y > 280) {
                    doc.addPage();
                    y = 20;
                }
                doc.text(linea, margenes, y);
                y += 7;
            });
            doc.save("Historial_ElGuardian.pdf");
        }
    </script>
</body>
</html>
